# https://zed.dev/docs/languages/python

# rather this than json !
# https://github.com/microsoft/pyright/blob/main/docs/configuration.md
[tool.basedpyright]
typeCheckingMode = "all"
pythonVersion = "3.14"
executionEnvironments = ["Linux", "Darwin", "Windows"]
exclude = [".ruff_cache"]

[tool.ruff]
target-version = "py314"

[tool.ruff.lint]
select = [
    "ANN", # flake8-annotations, require type annotations

    # snippet from ruff docs:
    "E", # pycodestyle
    "F", # Pyflakes
    "UP", # pyupgrade
    "B", # flake8-bugbear
    "SIM", # flake8-simplify
    "I", # isort

    # snippet from reddit comment:
    "DTZ", # require strict timezone manipulation with datetime
    "FBT", # detect boolean traps
    "N",   # enforce naming conventions, e.g. ClassName vs function_name
]
